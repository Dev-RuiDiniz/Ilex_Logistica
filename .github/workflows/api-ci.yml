name: API CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    env:
      ILEX_APP_NAME: Ilex API
      ILEX_ENVIRONMENT: ci
      ILEX_DATABASE_URL: sqlite:///./ilex_ci.db
      ILEX_JWT_SECRET: ci-only-secret-change-me
      ILEX_JWT_ALGORITHM: HS256
      ILEX_JWT_ACCESS_MINUTES: 30
      ILEX_JWT_REFRESH_MINUTES: 1440

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Run lint
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest -q
