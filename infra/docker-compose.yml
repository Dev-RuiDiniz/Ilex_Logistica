services:
  db:
    image: postgres:16-alpine
    container_name: ilex-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ilex}
      POSTGRES_USER: ${POSTGRES_USER:-ilex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ilex_local_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ilex-postgres-data:/var/lib/postgresql/data
    networks:
      - ilex-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ilex} -d ${POSTGRES_DB:-ilex}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: ..
      dockerfile: infra/docker/api/Dockerfile
    container_name: ilex-api
    environment:
      ILEX_APP_NAME: ${ILEX_APP_NAME:-Ilex API}
      ILEX_ENVIRONMENT: ${ILEX_ENVIRONMENT:-dev}
      ILEX_DATABASE_URL: ${ILEX_DATABASE_URL:-postgresql+psycopg2://ilex:ilex_local_password@db:5432/ilex}
      ILEX_JWT_SECRET: ${ILEX_JWT_SECRET:-change-me-local-only}
      ILEX_JWT_ALGORITHM: ${ILEX_JWT_ALGORITHM:-HS256}
      ILEX_JWT_ACCESS_MINUTES: ${ILEX_JWT_ACCESS_MINUTES:-30}
      ILEX_JWT_REFRESH_MINUTES: ${ILEX_JWT_REFRESH_MINUTES:-1440}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ilex-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: ..
      dockerfile: infra/docker/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    container_name: ilex-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
      PORT: ${WEB_PORT:-3000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    networks:
      - ilex-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000', r => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ilex-postgres-data:

networks:
  ilex-network:
    driver: bridge
