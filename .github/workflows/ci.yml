name: Web CI

on:
  pull_request:
  push:
    branches:
      - main
      - sprint-c-infra-qa-governanca

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Run build
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000/api/v1
        run: npm run build
