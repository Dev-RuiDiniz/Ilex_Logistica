name: API CI

on:
  pull_request:
  push:
    branches:
      - main
      - sprint-c-infra-qa-governanca

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Run tests
        env:
          ILEX_JWT_SECRET: ci-only-secret
        run: python -m pytest -q
